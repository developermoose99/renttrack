<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- ── PASTE YOUR FIREBASE CONFIG HERE ── -->
<script type="module">
import { initializeApp }                          from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword,
         signInWithEmailAndPassword, signOut,
         onAuthStateChanged, updatePassword }     from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, addDoc,
         setDoc, getDoc, getDocs, deleteDoc,
         updateDoc, onSnapshot, query,
         orderBy, serverTimestamp }               from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ╔══════════════════════════════════════════╗
// ║   PASTE YOUR FIREBASE CONFIG BELOW       ║
// ║   (replace the placeholder values)       ║
// ╚══════════════════════════════════════════╝
const firebaseConfig = {
  apiKey:            "AIzaSyAhX3FbPItOmFVzjvEOzykkmP_bDf-9NVk",
  authDomain:        "renttrack-b6a5c.firebaseapp.com",
  projectId:         "renttrack-b6a5c",
  storageBucket:     "renttrack-b6a5c.firebasestorage.app",
  messagingSenderId: "442657388680",
  appId:             "1:442657388680:web:adcc930ca72d2057ac873d"
};

// ═══════════════════════════════════════════
// INIT FIREBASE
// ═══════════════════════════════════════════
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let currentUser    = null;
let currentProfile = null;
let tenants        = [];
let payments       = [];
let view           = 'dashboard';
let filter         = 'all';
let unsubTenants   = null;
let unsubPayments  = null;

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
const g      = id  => document.getElementById(id);
const num    = v   => parseFloat(v) || 0;
const uid    = ()  => Math.random().toString(36).slice(2,11) + Date.now().toString(36);
const today  = ()  => new Date().toISOString().split('T')[0];

function fmtD(d) {
  if (!d) return '—';
  try {
    const dt = d?.toDate ? d.toDate() : new Date(typeof d==='string' ? d+'T00:00:00' : d);
    return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  } catch(e) { return String(d); }
}

function fmtTs(ts) {
  if (!ts) return '—';
  try {
    const dt = ts?.toDate ? ts.toDate() : new Date(ts);
    return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  } catch(e) { return '—'; }
}

const initials = n => (n||'?').split(' ').map(p=>p[0]||'').join('').toUpperCase().slice(0,2);

function toast(msg, type='s') {
  const t = g('toast');
  t.className = `toast t${type} on`;
  t.innerHTML = (type==='s'?'✓ ':type==='e'?'✗ ':'ℹ ') + msg;
  clearTimeout(t._tm);
  t._tm = setTimeout(() => t.classList.remove('on'), 3200);
}

function setSyncStatus(state) {
  const dot = g('syncDot');
  const lbl = g('syncLbl');
  if (!dot || !lbl) return;
  dot.className = 'sdot' + (state==='syncing'?' spin':state==='error'?' err':'');
  lbl.textContent = state==='syncing'?'Syncing…':state==='error'?'Error':'Live';
}

function om(id) { g(id).classList.add('on'); }
function cm(id) { g(id).classList.remove('on'); }

function showErrEl(id, msg) {
  const el = g(id);
  if (!el) return;
  el.textContent = msg;
  el.classList.add('on');
}

function clearErr(id) {
  const el = g(id);
  if (el) el.classList.remove('on');
}

// ═══════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════
function authTab(t) {
  g('vSignin').style.display = t==='signin' ? 'block' : 'none';
  g('vSignup').style.display = t==='signup' ? 'block' : 'none';
}
window.authTab = authTab;

async function doSignin() {
  const email = g('siEmail').value.trim();
  const pass  = g('siPass').value;
  clearErr('siErr');
  if (!email || !pass) { showErrEl('siErr','Email and password required.'); return; }
  const btn = g('siBtn');
  btn.classList.add('dim'); btn.textContent = 'Signing in…';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    showErrEl('siErr', friendlyAuthError(e.code));
    btn.classList.remove('dim'); btn.textContent = 'Sign In';
  }
}
window.doSignin = doSignin;

async function doSignup() {
  const name  = g('suName').value.trim();
  const email = g('suEmail').value.trim();
  const pass  = g('suPass').value;
  const role  = g('suRole').value;
  clearErr('suErr');
  if (!name||!email||!pass) { showErrEl('suErr','All fields required.'); return; }
  if (pass.length < 6)      { showErrEl('suErr','Password must be 6+ characters.'); return; }
  const btn = g('suBtn');
  btn.classList.add('dim'); btn.textContent = 'Creating…';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await setDoc(doc(db,'profiles', cred.user.uid), {
      name, email, role, createdAt: serverTimestamp()
    });
  } catch(e) {
    showErrEl('suErr', friendlyAuthError(e.code));
    btn.classList.remove('dim'); btn.textContent = 'Create Account';
  }
}
window.doSignup = doSignup;

async function doSignout() {
  unsubTenants?.(); unsubPayments?.();
  await signOut(auth);
  tenants = []; payments = []; currentUser = null; currentProfile = null;
  g('app').style.display  = 'none';
  g('auth').style.display = 'flex';
  g('siEmail').value = ''; g('siPass').value = '';
  clearErr('siErr'); authTab('signin');
}
window.doSignout = doSignout;

function friendlyAuthError(code) {
  const map = {
    'auth/user-not-found':       'No account found with this email.',
    'auth/wrong-password':       'Incorrect password.',
    'auth/invalid-email':        'Invalid email address.',
    'auth/email-already-in-use': 'An account with this email already exists.',
    'auth/weak-password':        'Password must be at least 6 characters.',
    'auth/invalid-credential':   'Incorrect email or password.',
    'auth/too-many-requests':    'Too many attempts. Please wait and try again.',
    'auth/network-request-failed': 'Network error. Check your connection.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}

// ═══════════════════════════════════════════
// AUTH STATE LISTENER
// ═══════════════════════════════════════════
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    const snap  = await getDoc(doc(db, 'profiles', user.uid));
    currentProfile = snap.exists() ? snap.data() : { name: user.email, role: 'viewer', email: user.email };
    launchApp();
  } else {
    g('auth').style.display = 'flex';
    g('app').style.display  = 'none';
  }
});

// ═══════════════════════════════════════════
// APP LAUNCH
// ═══════════════════════════════════════════
function launchApp() {
  g('auth').style.display = 'none';
  g('app').style.display  = 'block';
  const name = currentProfile?.name || currentUser?.email || 'User';
  g('uname').textContent = name;
  g('uav').textContent   = initials(name);
  subscribeData();
  gv('dashboard');
}

// ═══════════════════════════════════════════
// REAL-TIME DATA LISTENERS
// ═══════════════════════════════════════════
function subscribeData() {
  setSyncStatus('syncing');

  unsubTenants = onSnapshot(
    query(collection(db,'tenants'), orderBy('createdAt','desc')),
    snap => {
      tenants = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      updateBadges();
      render();
      setSyncStatus('live');
    },
    err => { console.error(err); setSyncStatus('error'); toast('Sync error: '+err.message,'e'); }
  );

  unsubPayments = onSnapshot(
    query(collection(db,'payments'), orderBy('createdAt','desc')),
    snap => {
      payments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      updateBadges();
      render();
    },
    err => { console.error(err); }
  );
}

// ═══════════════════════════════════════════
// ROUTING
// ═══════════════════════════════════════════
function gv(v) {
  view = v; filter = view==='tenants' ? filter : 'all';
  document.querySelectorAll('[id^="n-"],[id^="tt-"]').forEach(el => el.classList.remove('on'));
  const ne=g('n-'+v), te=g('tt-'+v);
  if(ne) ne.classList.add('on');
  if(te) te.classList.add('on');
  updateBadges(); render();
}
window.gv = gv;

function fv(f) {
  filter = f; gv('tenants');
  document.querySelectorAll('[id^="n-f-"]').forEach(el => el.classList.remove('on'));
  const el = g('n-f-'+f); if(el) el.classList.add('on');
}
window.fv = fv;

function render() {
  const c = g('content');
  if (!c) return;
  c.className = 'content fade';
  void c.offsetWidth;
  if      (view==='dashboard') c.innerHTML = vDashboard();
  else if (view==='tenants')   c.innerHTML = vTenants();
  else if (view==='payments')  c.innerHTML = vPayments();
  else if (view==='users')     c.innerHTML = vUsers();
  else if (view==='settings')  c.innerHTML = vSettings();
}

function updateBadges() {
  const nt=g('nb-t'), np=g('nb-p');
  if(nt) nt.textContent = tenants.length;
  if(np) np.textContent = payments.length;
}

// ═══════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════
function vDashboard() {
  const total     = tenants.length;
  const paidC     = tenants.filter(t=>t.status==='paid').length;
  const dueC      = tenants.filter(t=>t.status==='due').length;
  const partC     = tenants.filter(t=>t.status==='partial').length;
  const monthly   = tenants.reduce((s,t)=>s+num(t.rent),0);
  const collected = payments.reduce((s,p)=>s+num(p.amount),0);
  const recent    = payments.slice(0,6);

  // Bar chart by apt group
  const aptMap = {};
  tenants.forEach(t => {
    const k = (t.apt||'').split(' ').slice(0,3).join(' ');
    aptMap[k] = (aptMap[k]||0) + num(t.rent);
  });
  const aptKeys = Object.keys(aptMap).slice(0,7);
  const maxV    = Math.max(...Object.values(aptMap),1);
  const BCOLS   = ['#4f8eff','#00e5a0','#a855f7','#ff6b35','#ffd32a','#ff4757','#00b4d8'];
  const barsHTML = aptKeys.map((k,i)=>{
    const h = Math.round(aptMap[k]/maxV*100);
    return `<div class="bw">
      <div class="bar" style="height:${h}%;background:${BCOLS[i%BCOLS.length]}" data-v="$${aptMap[k]}/mo"></div>
      <div class="bar-lbl">${k.replace(/Apt|Neezoe/gi,'').trim().slice(0,7)||k.slice(0,7)}</div>
    </div>`;
  }).join('');

  // Donut
  const dData   = [{l:'Paid',v:paidC,c:'#00e5a0'},{l:'Partial',v:partC,c:'#ffd32a'},{l:'Due',v:dueC,c:'#ff4757'}];
  const dTotal  = paidC+partC+dueC||1;
  const R=50, circ=2*Math.PI*R; let off=0;
  const segs = dData.map(d=>{
    const dash=d.v/dTotal*circ;
    const s=`<circle cx="60" cy="60" r="${R}" fill="none" stroke="${d.c}" stroke-width="14"
      stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-off}" stroke-linecap="butt"/>`;
    off+=dash; return s;
  }).join('');
  const legHTML = dData.map(d=>`<div class="leg-item">
    <div class="leg-dot" style="background:${d.c}"></div>
    <div class="leg-lbl">${d.l}</div><div class="leg-val">${d.v}</div>
  </div>`).join('');

  // Activity
  const actHTML = recent.length ? recent.map(p=>{
    const t = tenants.find(x=>x.id===p.tenantId)||{name:'Unknown',apt:''};
    return `<div class="act-item">
      <div class="act-ic a-pay">💳</div>
      <div class="act-body">
        <div class="act-txt">${t.name} paid <strong style="color:var(--grn)">$${p.amount}</strong></div>
        <div class="act-time">${fmtD(p.date)} · ${t.apt}</div>
      </div>
      <div class="act-amt">+$${p.amount}</div>
    </div>`;
  }).join('') : '<div style="color:var(--t3);font-size:.79rem;padding:12px 0">No payments logged yet</div>';

  // Upcoming
  const todayMs = Date.now();
  const upHTML  = tenants
    .filter(t=>t.nextDate)
    .map(t=>({ ...t, _diff: Math.ceil((new Date(t.nextDate)-todayMs)/864e5) }))
    .sort((a,b)=>a._diff-b._diff)
    .slice(0,6).map(t=>{
      const over=t._diff<0, soon=t._diff>=0&&t._diff<=7;
      const col = over?'var(--red)':soon?'var(--ylw)':'var(--t2)';
      const lbl = over?`${Math.abs(t._diff)}d overdue`:t._diff===0?'Today':`in ${t._diff}d`;
      return `<div class="up-item">
        <div class="up-ic ${over||soon?'a-due':'a-new'}">${over?'⚠️':'📅'}</div>
        <div style="flex:1"><div style="font-size:.77rem;font-weight:600">${t.name}</div>
        <div style="font-size:.65rem;color:var(--t3)">${t.apt}</div></div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:.7rem;color:${col};font-weight:600">${lbl}</div>
      </div>`;
    }).join('') || '<div style="color:var(--t3);font-size:.79rem;padding:12px 0">No upcoming dates set</div>';

  return `
  <div class="stats">
    <div class="sc c1" onclick="gv('tenants')">
      <div class="sc-ic">🏘</div><div class="sc-lbl">Total Tenants</div>
      <div class="sc-val">${total}</div><div class="sc-sub">All units combined</div>
      <div class="sc-tag tag-up">Active</div>
    </div>
    <div class="sc c2" onclick="fv('paid')">
      <div class="sc-ic">✅</div><div class="sc-lbl">Paid Up</div>
      <div class="sc-val">${paidC}</div>
      <div class="sc-sub">${total?Math.round(paidC/total*100):0}% of tenants</div>
      <div class="sc-tag tag-up">↑ Good</div>
    </div>
    <div class="sc c3" onclick="gv('payments')">
      <div class="sc-ic">💰</div><div class="sc-lbl">Total Collected</div>
      <div class="sc-val">$${collected.toLocaleString()}</div>
      <div class="sc-sub">$${monthly}/mo expected</div>
    </div>
    <div class="sc c4" onclick="fv('due')">
      <div class="sc-ic">⚠️</div><div class="sc-lbl">Overdue</div>
      <div class="sc-val">${dueC}</div>
      <div class="sc-sub">${partC} partial payments</div>
      ${dueC>0?'<div class="sc-tag tag-dn">Needs attention</div>':''}
    </div>
  </div>

  <div class="chart-row">
    <div class="card">
      <div class="card-title">
        <span>Rent by Unit Group</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--t3)">$${monthly}/mo total</span>
      </div>
      <div class="bars">${barsHTML||'<div style="color:var(--t3);font-size:.79rem">Add tenants to see chart</div>'}</div>
    </div>
    <div class="card">
      <div class="card-title"><span>Payment Status</span></div>
      <div class="donut-wrap">
        <svg class="donut-svg" width="120" height="120" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="50" fill="none" stroke="var(--s3)" stroke-width="14"/>
          ${segs}
        </svg>
        <div class="leg">${legHTML}</div>
      </div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div class="card">
      <div class="card-title">
        <span>Recent Payments</span>
        <button class="btn btn-ghost btn-xs" onclick="gv('payments')">View all →</button>
      </div>
      <div class="act-list">${actHTML}</div>
    </div>
    <div class="card">
      <div class="card-title"><span>Upcoming Due Dates</span></div>
      ${upHTML}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
// TENANTS VIEW
// ═══════════════════════════════════════════
const COLS=[
  {bg:'rgba(79,142,255,.12)',c:'#4f8eff'},{bg:'rgba(0,229,160,.12)',c:'#00e5a0'},
  {bg:'rgba(168,85,247,.12)',c:'#a855f7'},{bg:'rgba(255,107,53,.12)',c:'#ff6b35'},
  {bg:'rgba(255,211,42,.12)',c:'#ffd32a'},{bg:'rgba(255,71,87,.12)',c:'#ff4757'},
];
const gc = i => COLS[i%COLS.length];

function badge(s) {
  if(s==='paid')    return '<span class="badge bp">Paid</span>';
  if(s==='due')     return '<span class="badge bd">Due</span>';
  return '<span class="badge bx">Partial</span>';
}

function tCard(t,i) {
  const col  = gc(i);
  const pct  = Math.min(100, t.monthsPaid ? Math.round(t.monthsPaid/(t.monthsPaid+3)*100) : 0);
  const bc   = t.status==='due'?'var(--red)':t.status==='partial'?'var(--ylw)':'var(--grn)';
  const isAd = currentProfile?.role==='admin';
  return `<div class="tc s${(t.status||'paid')[0]}" onclick="showDetail('${t.id}')">
    <div class="tc-hd">
      <div style="display:flex;align-items:center;gap:9px">
        <div class="tav" style="background:${col.bg};color:${col.c}">${initials(t.name)}</div>
        <div><div class="tn">${t.name}</div><div class="ta">${t.apt}</div></div>
      </div>
      ${badge(t.status||'paid')}
    </div>
    <div class="tm">
      <div><div class="ml">Monthly Rent</div><div class="mv">$${t.rent||0}</div></div>
      <div><div class="ml">Total Paid</div><div class="mv">$${num(t.amtPaid).toLocaleString()}</div></div>
      <div><div class="ml">Months</div><div class="mv">${t.monthsPaid||0}</div></div>
      <div><div class="ml">Next Due</div><div class="mv" style="font-size:.68rem">${fmtD(t.nextDate)}</div></div>
    </div>
    <div class="pbar"><div class="pfill" style="width:${pct}%;background:${bc}"></div></div>
    ${isAd?`<div class="tc-acts" onclick="event.stopPropagation()">
      <button class="btn btn-ghost btn-xs" onclick="editT('${t.id}')">Edit</button>
      <button class="btn btn-grn btn-xs" onclick="openPMFor('${t.id}')">+ Pay</button>
      <button class="btn btn-red btn-xs" onclick="confirmDel('${t.id}')">Delete</button>
    </div>`:''}
  </div>`;
}

function vTenants() {
  const list  = filter==='all' ? tenants : tenants.filter(t=>t.status===filter);
  const isAd  = currentProfile?.role==='admin';
  return `<div class="sec-hd">
    <div class="sec-title">Tenants (${list.length})</div>
    <div class="sec-acts">
      <input class="srch" placeholder="Search name or unit…" oninput="searchT(this.value)" id="tsrch">
      ${isAd?`<button class="btn btn-acc btn-sm" onclick="openTM()">+ Add Tenant</button>`:''}
    </div>
  </div>
  <div class="tgrid" id="tgrid">
    ${list.length
      ? list.map((t,i)=>tCard(t,i)).join('')
      : '<div class="empty"><div class="empty-ic">🏠</div><div>No tenants found</div></div>'}
  </div>`;
}

function searchT(q) {
  const grid=g('tgrid'); if(!grid) return;
  const lq=q.toLowerCase();
  const fl=tenants.filter(t=>t.name.toLowerCase().includes(lq)||t.apt.toLowerCase().includes(lq)||(t.phone||'').includes(lq));
  grid.innerHTML=fl.length?fl.map((t,i)=>tCard(t,i)).join(''):'<div class="empty"><div class="empty-ic">🔍</div><div>No matches</div></div>';
}
window.searchT = searchT;

// ═══════════════════════════════════════════
// PAYMENTS VIEW
// ═══════════════════════════════════════════
function vPayments() {
  const total = payments.reduce((s,p)=>s+num(p.amount),0);
  const isAd  = currentProfile?.role==='admin';
  return `<div class="sec-hd">
    <div class="sec-title">Payment Log</div>
    <div class="sec-acts">
      <span class="mono" style="font-size:.79rem;color:var(--grn)">Total: $${total.toLocaleString()}</span>
      ${isAd?`<button class="btn btn-acc btn-sm" onclick="openPM()">+ Log Payment</button>`:''}
    </div>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr><th>Tenant</th><th>Unit</th><th>Amount</th><th>Months</th><th>Date Paid</th><th>Next Due</th><th>Notes</th></tr></thead>
      <tbody>
        ${payments.length ? payments.map(p=>{
          const t=tenants.find(x=>x.id===p.tenantId)||{name:'Unknown',apt:''};
          return `<tr>
            <td style="font-weight:600">${t.name}</td>
            <td style="font-size:.69rem;color:var(--t3)">${t.apt}</td>
            <td class="mono" style="color:var(--grn)">+$${num(p.amount).toLocaleString()}</td>
            <td class="mono">${p.months||'—'}</td>
            <td>${fmtD(p.date)}</td>
            <td>${fmtD(p.nextDate)}</td>
            <td style="color:var(--t3);font-size:.72rem">${p.notes||'—'}</td>
          </tr>`;
        }).join('') : '<tr><td colspan="7" style="text-align:center;color:var(--t3);padding:28px">No payments logged yet</td></tr>'}
      </tbody>
    </table>
  </div>`;
}

// ═══════════════════════════════════════════
// DETAIL MODAL
// ═══════════════════════════════════════════
function showDetail(id) {
  const t=tenants.find(x=>x.id===id); if(!t) return;
  const ci=tenants.indexOf(t), col=gc(ci);
  const tPays=payments.filter(p=>p.tenantId===id);
  const isAd=currentProfile?.role==='admin';
  g('dtTitle').textContent=t.name;
  g('dtBody').innerHTML=`
    <div style="display:flex;align-items:center;gap:13px;margin-bottom:18px">

async function vUsers() {
  const c    = g('content');
  const isAd = currentProfile?.role==='admin';
  // fetch all profiles from firestore
  let profiles = [];
  try {
    const snap = await getDocs(collection(db,'profiles'));
    profiles   = snap.docs.map(d=>({id:d.id,...d.data()}));
  } catch(e) { profiles = []; }

  c.innerHTML = `<div class="sec-hd">
    <div class="sec-title">Users (${profiles.length})</div>
    ${isAd?`<button class="btn btn-acc btn-sm" onclick="showAddUser()">+ Add User</button>`:''}
  </div>
  <div class="ulist">
    ${profiles.map(u=>`
      <div class="urow">
        <div class="urow-av">${initials(u.name||u.email||'?')}</div>
        <div class="urow-info">
          <div class="urow-name">${u.name||u.email} ${u.id===currentUser?.uid?'<span style="font-size:.62rem;color:var(--t3)">(you)</span>':''}</div>
          <div class="urow-meta">${u.email||''} · Joined ${fmtTs(u.createdAt)}</div>
        </div>
        <span class="role-badge ${u.role==='admin'?'r-admin':'r-viewer'}">${u.role||'viewer'}</span>
        ${isAd?`<div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-xs" onclick="changeRole('${u.id}','${u.role}')">
            ${u.role==='admin'?'Make Viewer':'Make Admin'}

      </div>`).join('')}
  </div>
  <div class="card" style="margin-top:16px">
    <div class="card-title"><span>How to add users</span></div>
    <div style="font-size:.78rem;color:var(--t2);line-height:1.9">
      Share the app URL with anyone you want to invite.<br>
      They click <strong>Create Account</strong> and sign up.<br>
      You can then change their role to <strong>Admin</strong> or <strong>Viewer</strong> from this page.
    </div>
  </div>`;
}

async function changeRole(uid, currentRole) {
  const newRole = currentRole==='admin' ? 'viewer' : 'admin';
  await updateDoc(doc(db,'profiles',uid), { role: newRole });
  toast(`Role changed to ${newRole}`,'s');
  gv('users');
}
window.changeRole = changeRole;

function showAddUser() {
  authTab('signup');
  doSignout();
}
window.showAddUser = showAddUser;

// ═══════════════════════════════════════════
function vSettings() {
  const me = currentProfile;
  return `<div class="sec-hd"><div class="sec-title">Settings</div></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">

        <div>
          <div style="font-weight:700">${me?.name||'Unknown'}</div>
          <div style="font-size:.73rem;color:var(--t3)">${currentUser?.email||''}</div>
          <div style="margin-top:5px"><span class="role-badge ${me?.role==='admin'?'r-admin':'r-viewer'}">${me?.role||'viewer'}</span></div>

      </div>
      <button class="btn btn-red btn-sm btn-full" onclick="doSignout()">Sign Out</button>

        All data syncs in real-time across every device.<br>
        Tenants: <strong>${tenants.length}</strong> &nbsp;|&nbsp; Payments: <strong>${payments.length}</strong>

      <div class="card-title"><span>Summary</span></div>

        <div class="di"><div class="ml">Payments</div><div class="mv mono">${payments.length}</div></div>
        <div class="di"><div class="ml">Total Collected</div><div class="mv mono">$${payments.reduce((s,p)=>s+num(p.amount),0).toLocaleString()}</div></div>

// ═══════════════════════════════════════════
// TENANT CRUD (Firebase)
// ═══════════════════════════════════════════
function openTM(id) {
  g('tmTitle').textContent = id ? 'Edit Tenant' : 'Add Tenant';
  g('tmId').value = id||'';
  g('tmErr').classList.remove('on');
  if (!id) {
    ['tmName','tmApt','tmPhone','tmNote'].forEach(x=>g(x).value='');
    ['tmRent','tmPaid','tmMonths'].forEach(x=>g(x).value='');
    g('tmStatus').value='paid'; g('tmNext').value='';
  } else {
    const t=tenants.find(x=>x.id===id); if(!t) return;
    g('tmName').value=t.name; g('tmApt').value=t.apt; g('tmRent').value=t.rent||'';
    g('tmPhone').value=t.phone||''; g('tmStatus').value=t.status||'paid';
    g('tmNext').value=t.nextDate||''; g('tmPaid').value=t.amtPaid||0;
    g('tmMonths').value=t.monthsPaid||0; g('tmNote').value=t.comment||'';
  }
  om('tmModal');
}
window.openTM = openTM;
function editT(id) { openTM(id); }
window.editT = editT;

async function saveTenant() {
  const name=g('tmName').value.trim(), apt=g('tmApt').value.trim();
  if (!name||!apt) { showErrEl('tmErr','Name and apartment required.'); return; }
  const btn=g('tmSave'); btn.classList.add('dim'); btn.textContent='Saving…';
  const id=g('tmId').value;
  const data = {
    name, apt,
    rent:      parseFloat(g('tmRent').value)||0,
    phone:     g('tmPhone').value.trim(),
    status:    g('tmStatus').value,
    nextDate:  g('tmNext').value||null,
    amtPaid:   parseFloat(g('tmPaid').value)||0,
    monthsPaid:parseInt(g('tmMonths').value)||0,
    comment:   g('tmNote').value.trim(),
  };
  try {
    if (id) { await updateDoc(doc(db,'tenants',id), data); toast('Tenant updated','s'); }
    else    { data.createdAt=serverTimestamp(); data.createdBy=currentUser.uid; await addDoc(collection(db,'tenants'),data); toast('Tenant added','s'); }
    cm('tmModal');
  } catch(e) { showErrEl('tmErr',e.message); }
  btn.classList.remove('dim'); btn.textContent='Save Tenant';
}
window.saveTenant = saveTenant;

function confirmDel(id) {
  const t=tenants.find(x=>x.id===id); if(!t) return;
  g('cfTitle').textContent='Delete Tenant';
  g('cfMsg').textContent=`Delete "${t.name}"? All their payment records will also be removed.`;
  g('cfOk').onclick = async () => {
    // delete payments for this tenant
    const pSnap = await getDocs(query(collection(db,'payments')));
    const toPay = pSnap.docs.filter(d=>d.data().tenantId===id);
    await Promise.all(toPay.map(d=>deleteDoc(doc(db,'payments',d.id))));
    await deleteDoc(doc(db,'tenants',id));
    cm('cfModal'); toast('Tenant deleted','i');
  };
  om('cfModal');
}
window.confirmDel = confirmDel;

// ═══════════════════════════════════════════
// PAYMENT CRUD (Firebase)
// ═══════════════════════════════════════════
function openPM() {
  const sel=g('pmTenant');
  sel.innerHTML=tenants.map(t=>`<option value="${t.id}">${t.name} — ${t.apt}</option>`).join('');
  g('pmAmt').value=''; g('pmDate').value=today();
  g('pmMonths').value='1'; g('pmNext').value=''; g('pmNote').value='';
  g('pmErr').classList.remove('on'); afr(); om('pmModal');
}
window.openPM = openPM;

function openPMFor(id) { openPM(); g('pmTenant').value=id; afr(); }
window.openPMFor = openPMFor;

function afr() {
  const t=tenants.find(x=>x.id===g('pmTenant')?.value);
  if(t) g('pmAmt').value=t.rent;
}
window.afr = afr;

async function savePayment() {
  const tid=g('pmTenant').value;
  const amt=parseFloat(g('pmAmt').value)||0;
  const date=g('pmDate').value;
  const months=parseInt(g('pmMonths').value)||1;
  const nextDate=g('pmNext').value||null;
  const notes=g('pmNote').value.trim();
  if (!tid||!amt) { showErrEl('pmErr','Select a tenant and enter an amount.'); return; }
  const btn=g('pmSave'); btn.classList.add('dim'); btn.textContent='Saving…';
  try {
    await addDoc(collection(db,'payments'), {
      tenantId:tid, amount:amt, date, months, nextDate, notes,
      createdAt:serverTimestamp(), loggedBy:currentUser.uid
    });
    const t=tenants.find(x=>x.id===tid);
    if(t) {
      await updateDoc(doc(db,'tenants',tid), {
        amtPaid:   (num(t.amtPaid)+amt),
        monthsPaid:(num(t.monthsPaid)+months),
        nextDate:  nextDate||t.nextDate||null,
        status:    'paid'
      });
    }
    cm('pmModal'); toast('Payment logged ✓','s');
  } catch(e) { showErrEl('pmErr',e.message); }
  btn.classList.remove('dim'); btn.textContent='Log Payment';
}
window.savePayment = savePayment;

// ═══════════════════════════════════════════
// EXPOSE GLOBALS
// ═══════════════════════════════════════════
window.openTM      = openTM;
window.openPM      = openPM;
window.doSignout   = doSignout;
window.cm          = cm;
window.om          = om;
window.confirmDel  = confirmDel;
window.showDetail  = showDetail;
window.gv          = gv;
window.fv          = fv;
window.authTab     = authTab;

// Override render for users view async
const _gv = gv;
window.gv = function(v) {
  if (v==='users') {
    view=v;
    document.querySelectorAll('[id^="n-"],[id^="tt-"]').forEach(el=>el.classList.remove('on'));
    const ne=g('n-'+v),te=g('tt-'+v);
    if(ne)ne.classList.add('on'); if(te)te.classList.add('on');
    updateBadges(); vUsers();
  } else { _gv(v); }
};

</script>

<style>
:root{

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;}

/* AUTH */

.auth-wrap{width:400px;max-width:95vw;position:relative;z-index:1;}
.auth-card{background:var(--s1);border:1px solid var(--br);border-radius:20px;padding:36px;animation:up .45s cubic-bezier(.22,1,.36,1);}
@keyframes up{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.auth-logo{display:flex;align-items:center;gap:11px;margin-bottom:28px;}
.auth-mark{width:40px;height:40px;background:linear-gradient(135deg,var(--acc),#7c3aed);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;}
.auth-brand{font-family:'Playfair Display',serif;font-size:1.3rem;}
.auth-sub{font-size:.62rem;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;}
.auth-tabs{display:flex;background:var(--bg);border:1px solid var(--br);border-radius:var(--rs);padding:3px;margin-bottom:22px;}

/* FORMS */
.fg{display:flex;flex-direction:column;gap:12px;}

.fg2 .full{grid-column:1/-1;}

input:focus,select:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-g);}

.err{font-size:.72rem;color:var(--red);margin-top:2px;display:none;}
.err.on{display:block;}

/* BUTTONS */
.btn{font-family:'Space Grotesk',sans-serif;padding:9px 18px;border-radius:var(--rs);font-size:.8rem;font-weight:600;cursor:pointer;border:none;transition:all .18s;display:inline-flex;align-items:center;gap:7px;}
.btn-blue{background:linear-gradient(135deg,#4f8eff,#3a6fd4);color:#fff;width:100%;justify-content:center;}

/* APP */

.user-chip{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--br);border-radius:20px;padding:4px 12px 4px 4px;cursor:pointer;}

.chart-row{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:22px;}
.card{background:var(--s1);border:1px solid var(--br);border-radius:var(--r);padding:18px;}
.card-title{font-size:.75rem;font-weight:600;color:var(--t2);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.card-title span:first-child{font-family:'Playfair Display',serif;font-size:.98rem;color:var(--t1);}
.bars{display:flex;align-items:flex-end;gap:7px;height:110px;}
.bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height .6s cubic-bezier(.34,1.56,.64,1);cursor:pointer;position:relative;min-height:3px;}
.bar:hover::after{content:attr(data-v);position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:.62rem;font-family:'JetBrains Mono',monospace;color:var(--t1);background:var(--s3);padding:2px 5px;border-radius:4px;white-space:nowrap;}
.bar-lbl{font-size:.57rem;color:var(--t3);text-align:center;}
.donut-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;}
.donut-svg{transform:rotate(-90deg);}
.leg{display:flex;flex-direction:column;gap:6px;width:100%;}
.leg-item{display:flex;align-items:center;gap:7px;font-size:.72rem;}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.leg-lbl{color:var(--t2);flex:1;}
.leg-val{font-family:'JetBrains Mono',monospace;font-size:.7rem;}
.act-list{display:flex;flex-direction:column;}
.act-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--br);}
.act-item:last-child{border-bottom:none;}
.act-ic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;}
.a-pay{background:rgba(0,229,160,.1);color:var(--grn);}
.a-new{background:rgba(79,142,255,.1);color:var(--acc);}
.a-due{background:rgba(255,71,87,.1);color:var(--red);}
.act-body{flex:1;}
.act-txt{font-size:.77rem;font-weight:500;line-height:1.4;}
.act-time{font-size:.65rem;color:var(--t3);margin-top:1px;}
.act-amt{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--grn);}
.up-item{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--br);}
.up-item:last-child{border-bottom:none;}
.up-ic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;}

/* SECTION */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-title{font-family:'Playfair Display',serif;font-size:1.2rem;}
.sec-acts{display:flex;gap:7px;align-items:center;}
.srch{font-family:'Space Grotesk',sans-serif;background:var(--s1);border:1px solid var(--br);color:var(--t1);padding:8px 12px;border-radius:var(--rs);font-size:.77rem;outline:none;width:185px;transition:border-color .15s;}
.srch:focus{border-color:var(--acc);}
.srch::placeholder{color:var(--t3);}

/* TENANT CARDS */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:13px;}
.tc{background:var(--s1);border:1px solid var(--br);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
.tc::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;}
.tc.sp::before{background:var(--grn);}
.tc.sd::before{background:var(--red);}
.tc.sx::before{background:var(--ylw);}
.tc:hover{border-color:var(--br2);transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.4);}
.tc-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.tav{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0;}
.tn{font-weight:700;font-size:.86rem;line-height:1.3;}
.ta{font-size:.67rem;color:var(--t3);}
.badge{padding:2px 8px;border-radius:10px;font-size:.58rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.bp{background:rgba(0,229,160,.1);color:var(--grn);border:1px solid rgba(0,229,160,.2);}
.bd{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.2);}
.bx{background:rgba(255,211,42,.1);color:var(--ylw);border:1px solid rgba(255,211,42,.2);}
.tm{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.ml{font-size:.57rem;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:1px;}
.mv{font-family:'JetBrains Mono',monospace;font-size:.77rem;}
.pbar{height:3px;background:var(--s3);border-radius:2px;overflow:hidden;}
.pfill{height:100%;border-radius:2px;transition:width .5s ease;}
.tc-acts{display:flex;gap:5px;margin-top:10px;}

/* TABLE */
.tbl-wrap{background:var(--s1);border:1px solid var(--br);border-radius:var(--r);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead th{padding:10px 14px;text-align:left;font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);background:var(--s2);border-bottom:1px solid var(--br);font-weight:700;}
tbody tr{border-bottom:1px solid var(--br);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--s2);}
tbody td{padding:11px 14px;font-size:.79rem;}
.mono{font-family:'JetBrains Mono',monospace;}

/* MODALS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.ov.on{opacity:1;pointer-events:all;}
.modal{background:var(--s1);border:1px solid var(--br);border-radius:18px;padding:26px;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto;transform:scale(.95) translateY(10px);transition:transform .2s;box-shadow:0 40px 80px rgba(0,0,0,.6);}
.ov.on .modal{transform:scale(1) translateY(0);}
.modal-lg{width:560px;}
.modal-sm{width:360px;}
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.mtitle{font-family:'Playfair Display',serif;font-size:1.18rem;}
.xbtn{width:28px;height:28px;border-radius:6px;background:var(--s2);border:none;cursor:pointer;color:var(--t2);display:flex;align-items:center;justify-content:center;font-size:.82rem;transition:all .14s;}
.xbtn:hover{background:var(--s3);color:var(--t1);}
.macts{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--br);}

/* DETAIL */
.dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:16px;}
.di{background:var(--s2);border-radius:var(--rs);padding:11px;}
.plog{display:flex;flex-direction:column;}
.pl-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--br);}
.pl-item:last-child{border-bottom:none;}
.pl-ic{width:28px;height:28px;border-radius:7px;background:rgba(0,229,160,.1);color:var(--grn);display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;}
.pl-info{flex:1;}
.pl-desc{font-size:.77rem;font-weight:600;}
.pl-date{font-size:.64rem;color:var(--t3);margin-top:1px;}
.pl-amt{font-family:'JetBrains Mono',monospace;font-size:.82rem;color:var(--grn);}

/* USERS */
.ulist{display:flex;flex-direction:column;gap:9px;}
.urow{background:var(--s1);border:1px solid var(--br);border-radius:var(--rs);padding:13px 15px;display:flex;align-items:center;gap:11px;}
.urow-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--pur));display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0;}
.urow-info{flex:1;}
.urow-name{font-size:.82rem;font-weight:600;}
.urow-meta{font-size:.68rem;color:var(--t3);margin-top:1px;}
.role-badge{padding:2px 8px;border-radius:8px;font-size:.58rem;font-weight:700;text-transform:uppercase;}
.r-admin{background:rgba(168,85,247,.12);color:var(--pur);border:1px solid rgba(168,85,247,.2);}
.r-viewer{background:rgba(79,142,255,.1);color:var(--acc);border:1px solid rgba(79,142,255,.2);}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;z-index:9999;background:var(--s1);border:1px solid var(--br);border-radius:11px;padding:11px 16px;font-size:.79rem;display:flex;align-items:center;gap:8px;transform:translateY(70px);opacity:0;transition:all .28s;box-shadow:0 18px 36px rgba(0,0,0,.45);max-width:280px;}
.toast.on{transform:translateY(0);opacity:1;}
.toast.ts{border-left:3px solid var(--grn);}
.toast.te{border-left:3px solid var(--red);}
.toast.ti{border-left:3px solid var(--acc);}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--t3);}
.empty-ic{font-size:2.8rem;margin-bottom:10px;opacity:.5;}

/* ANIMATIONS */
.fade{animation:fd .35s ease;}
@keyframes fd{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:900px){.side{display:none;}.stats{grid-template-columns:1fr 1fr;}.chart-row{grid-template-columns:1fr;}.top-nav{display:none;}.content{padding:14px;}}
@media(max-width:580px){.stats{grid-template-columns:1fr;}.tgrid{grid-template-columns:1fr;}}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--br);border-radius:3px;}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-blob bb1"></div>
<div class="bg-blob bb2"></div>

<!-- AUTH -->
<div id="auth">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-mark">🏠</div>
        <div><div class="auth-brand">RentTrack</div><div class="auth-sub">Property Manager</div></div>
      </div>
      <!-- Sign In -->
      <div id="vSignin">
        <div class="auth-tabs">
          <div class="auth-tab on" onclick="authTab('signin')">Sign In</div>
          <div class="auth-tab" onclick="authTab('signup')">Create Account</div>
        </div>
        <div class="fg">
          <div class="fgrp"><label>Email</label><input id="siEmail" type="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doSignin()"></div>
          <div class="fgrp"><label>Password</label><input id="siPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doSignin()"></div>
          <div class="err" id="siErr"></div>
          <button class="btn btn-blue" onclick="doSignin()" id="siBtn">Sign In</button>
        </div>
      </div>
      <!-- Sign Up -->
      <div id="vSignup" style="display:none">
        <div class="auth-tabs">
          <div class="auth-tab" onclick="authTab('signin')">Sign In</div>
          <div class="auth-tab on" onclick="authTab('signup')">Create Account</div>
        </div>
        <div class="fg">
          <div class="fgrp"><label>Full Name</label><input id="suName" type="text" placeholder="Your name"></div>
          <div class="fgrp"><label>Email</label><input id="suEmail" type="email" placeholder="you@example.com"></div>
          <div class="fgrp"><label>Password</label><input id="suPass" type="password" placeholder="Min 6 characters"></div>
          <div class="fgrp"><label>Role</label>
            <select id="suRole">
              <option value="admin">Admin — full access</option>
              <option value="viewer">Viewer — read only</option>
            </select>
          </div>
          <div class="err" id="suErr"></div>
          <button class="btn btn-blue" onclick="doSignup()" id="suBtn">Create Account</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="logo" onclick="window.gv('dashboard')">
      <div class="logo-mark">🏠</div>
      <div class="logo-txt">RentTrack</div>
    </div>
    <div class="top-nav">
      <div class="tnav on" id="tt-dashboard" onclick="window.gv('dashboard')">Dashboard</div>
      <div class="tnav" id="tt-tenants" onclick="window.gv('tenants')">Tenants</div>
      <div class="tnav" id="tt-payments" onclick="window.gv('payments')">Payments</div>
    </div>
    <div class="top-right">
      <div class="sync-wrap"><div class="sdot" id="syncDot"></div><span id="syncLbl">Live</span></div>
      <button class="btn btn-ghost btn-sm" onclick="window.openTM()">+ Tenant</button>
      <button class="btn btn-acc btn-sm" onclick="window.openPM()">+ Payment</button>
      <div class="user-chip" onclick="window.gv('settings')">
        <div class="uav" id="uav">?</div>
        <div class="uname" id="uname">…</div>
      </div>
    </div>
  </div>
  <div class="body">
    <div class="side">
      <div class="side-lbl">Main</div>
      <div class="nav on" id="n-dashboard" onclick="window.gv('dashboard')"><span class="nav-ic">📊</span>Dashboard</div>
      <div class="nav" id="n-tenants" onclick="window.gv('tenants')"><span class="nav-ic">🏘</span>Tenants<span class="nav-badge" id="nb-t">0</span></div>
      <div class="nav" id="n-payments" onclick="window.gv('payments')"><span class="nav-ic">💳</span>Payments<span class="nav-badge" id="nb-p">0</span></div>
      <div class="side-lbl" style="margin-top:7px">Filter</div>
      <div class="nav" id="n-f-all" onclick="window.fv('all')"><span class="nav-ic">👥</span>All</div>
      <div class="nav" id="n-f-paid" onclick="window.fv('paid')"><span class="nav-ic" style="color:var(--grn)">✓</span>Paid</div>
      <div class="nav" id="n-f-due" onclick="window.fv('due')"><span class="nav-ic" style="color:var(--red)">!</span>Overdue</div>
      <div class="nav" id="n-f-partial" onclick="window.fv('partial')"><span class="nav-ic" style="color:var(--ylw)">~</span>Partial</div>
      <div class="side-lbl" style="margin-top:7px">Admin</div>
      <div class="nav" id="n-users" onclick="window.gv('users')"><span class="nav-ic">👤</span>Users</div>
      <div class="nav" id="n-settings" onclick="window.gv('settings')"><span class="nav-ic">⚙</span>Settings</div>
      <div class="nav" onclick="window.doSignout()" style="color:var(--red);margin-top:4px"><span class="nav-ic">↩</span>Sign Out</div>
    </div>
    <div class="content fade" id="content"></div>
  </div>
</div>

<!-- MODALS -->
<div class="ov" id="tmModal">
  <div class="modal">
    <div class="mhd"><div class="mtitle" id="tmTitle">Add Tenant</div><button class="xbtn" onclick="window.cm('tmModal')">✕</button></div>
    <input type="hidden" id="tmId">
    <div class="fg2">
      <div class="fgrp full"><label>Full Name *</label><input id="tmName" placeholder="e.g. John Smith"></div>
      <div class="fgrp"><label>Apartment / Unit *</label><input id="tmApt" placeholder="e.g. 4 Room Apt"></div>
      <div class="fgrp"><label>Monthly Rent ($) *</label><input id="tmRent" type="number" min="0" placeholder="60"></div>
      <div class="fgrp"><label>Phone</label><input id="tmPhone" placeholder="+231..."></div>
      <div class="fgrp"><label>Status</label>
        <select id="tmStatus"><option value="paid">Paid</option><option value="partial">Partial</option><option value="due">Due</option></select>
      </div>
      <div class="fgrp"><label>Next Due Date</label><input id="tmNext" type="date"></div>
      <div class="fgrp"><label>Total Paid ($)</label><input id="tmPaid" type="number" min="0" placeholder="0"></div>
      <div class="fgrp"><label>Months Paid</label><input id="tmMonths" type="number" min="0" placeholder="0"></div>
      <div class="fgrp full"><label>Notes</label><textarea id="tmNote" placeholder="Any notes…"></textarea></div>
    </div>
    <div class="err" id="tmErr"></div>
    <div class="macts">
      <button class="btn btn-ghost" onclick="window.cm('tmModal')">Cancel</button>
      <button class="btn btn-acc" onclick="window.saveTenant()" id="tmSave">Save Tenant</button>
    </div>
  </div>
</div>

<div class="ov" id="pmModal">
  <div class="modal">
    <div class="mhd"><div class="mtitle">Log Payment</div><button class="xbtn" onclick="window.cm('pmModal')">✕</button></div>
    <div class="fg2">
      <div class="fgrp full"><label>Tenant *</label><select id="pmTenant" onchange="window.afr()"></select></div>
      <div class="fgrp"><label>Amount ($) *</label><input id="pmAmt" type="number" min="0" placeholder="60"></div>
      <div class="fgrp"><label>Date</label><input id="pmDate" type="date"></div>
      <div class="fgrp"><label>Months Covered</label><input id="pmMonths" type="number" min="1" placeholder="1"></div>
      <div class="fgrp"><label>Next Due Date</label><input id="pmNext" type="date"></div>
      <div class="fgrp full"><label>Notes</label><input id="pmNote" placeholder="e.g. Cash — January rent"></div>
    </div>
    <div class="err" id="pmErr"></div>
    <div class="macts">
      <button class="btn btn-ghost" onclick="window.cm('pmModal')">Cancel</button>
      <button class="btn btn-acc" onclick="window.savePayment()" id="pmSave">Log Payment</button>
    </div>
  </div>
</div>

<div class="ov" id="dtModal">
  <div class="modal modal-lg">
    <div class="mhd"><div class="mtitle" id="dtTitle"></div><button class="xbtn" onclick="window.cm('dtModal')">✕</button></div>
    <div id="dtBody"></div>
  </div>
</div>

<div class="ov" id="cfModal">
  <div class="modal modal-sm">
    <div class="mhd"><div class="mtitle" id="cfTitle">Confirm</div><button class="xbtn" onclick="window.cm('cfModal')">✕</button></div>
    <p id="cfMsg" style="color:var(--t2);font-size:.82rem;line-height:1.6;margin-bottom:4px"></p>
    <div class="macts">
      <button class="btn btn-ghost" onclick="window.cm('cfModal')">Cancel</button>
      <button class="btn btn-red" id="cfOk">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Close modals on backdrop click
document.querySelectorAll('.ov').forEach(el=>{
  el.addEventListener('click',e=>{ if(e.target===el) el.classList.remove('on'); });
});
// Enter key on signin
document.getElementById('siEmail')?.addEventListener('keydown',e=>{ if(e.key==='Enter') window.doSignin?.(); });
document.getElementById('siPass')?.addEventListener('keydown',e=>{ if(e.key==='Enter') window.doSignin?.(); });
</script>
</body>
</html>
